name: Build Ionic Android and iOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Global CLIs
      run: npm install -g @ionic/cli @capacitor/assets @capacitor/cli

    - name: Install Project Dependencies
      run: |
        npm install --legacy-peer-deps
        npm install @capacitor/core @capacitor/android --save-dev

    - name: Build Web Assets
      run: ionic build --prod

    - name: Handle Capacitor Setup and Sync
      run: |
        # Safely determine if build folder is www, dist, or build
        WEB_DIR="www"
        if [ -d "dist" ]; then WEB_DIR="dist"; fi
        if [ -d "build" ]; then WEB_DIR="build"; fi
        
        # Force generate config if missing entirely
        if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
          npx cap init kota com.example.kota --web-dir=$WEB_DIR --confirm
        fi
        
        # Sync and add Android platform
        npx cap add android || true
        npx cap sync android

    - name: Compile Android Debug APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Android APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    runs-on: macos-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Global CLIs
      run: npm install -g @ionic/cli @capacitor/assets @capacitor/cli

    - name: Install Project Dependencies
      run: |
        npm install --legacy-peer-deps
        npm install @capacitor/core @capacitor/ios --save-dev

    - name: Build Web Assets
      run: ionic build --prod

    - name: Handle Capacitor Setup and Sync
      run: |
        WEB_DIR="www"
        if [ -d "dist" ]; then WEB_DIR="dist"; fi
        if [ -d "build" ]; then WEB_DIR="build"; fi
        
        if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
          npx cap init kota com.example.kota --web-dir=$WEB_DIR --confirm
        fi
        
        npx cap add ios || true
        npx cap sync ios

    - name: Compile Xcode Project (Bypass Signings)
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace -scheme App -destination 'generic/platform=iOS' -configuration Debug CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

    - name: Upload iOS Xcode Project Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-xcode-project
        path: ios/App


