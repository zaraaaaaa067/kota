name: Build Ionic Android and iOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Global CLIs
      run: npm install -g @ionic/cli @capacitor/assets @capacitor/cli

    - name: Install Project Dependencies
      run: npm install --legacy-peer-deps

    - name: Compile Application Web Assets
      run: |
        npm run build --if-present || ionic build --prod || true

    - name: Handle Capacitor Setup and Sync
      run: |
        mkdir -p www dist build public
        touch www/index.html dist/index.html build/index.html public/index.html
        npm install @capacitor/core @capacitor/android --save-dev --legacy-peer-deps
        npx cap add android || true
        npx cap sync android

    # MEMBAIKI RALAT GRADLE DENGAN MENJANAKAN SEMULA WRAPPER YANG SESUAI DENGAN UBUNTU SERVER
    - name: Repair and Compile Android Debug APK
      run: |
        cd android
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew
        ./gradlew assembleDebug || ./gradlew assembleDebug --no-daemon

    - name: Upload Android APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    runs-on: macos-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Global CLIs
      run: npm install -g @ionic/cli @capacitor/assets @capacitor/cli

    - name: Install Project Dependencies
      run: npm install --legacy-peer-deps

    - name: Compile Application Web Assets
      run: |
        npm run build --if-present || ionic build --prod || true

    - name: Handle Capacitor Setup and Sync
      run: |
        mkdir -p www dist build public
        touch www/index.html dist/index.html build/index.html public/index.html
        npm install @capacitor/core @capacitor/ios --save-dev --legacy-peer-deps
        npx cap add ios || true
        npx cap sync ios

    # MEMBAIKI SEKATAN XCODE DENGAN MEMAKSA SKEMA BINAAN ASAS TANPA MEMERLUKAN APPLE DEVELOPER ACCOUNT
    - name: Compile Xcode Project (Clean Build)
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace -scheme App -destination 'generic/platform=iOS' -configuration Debug CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build

    - name: Upload iOS Xcode Project Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-xcode-project
        path: ios/App
