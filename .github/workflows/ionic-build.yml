name: Build Ionic Android and iOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Global CLIs
      run: npm install -g @ionic/cli @capacitor/assets @capacitor/cli

    - name: Install Project Dependencies
      run: npm install --legacy-peer-deps

    # REPLACED SEPARATE BUILD AND SYNC WITH THE OFFICIAL NATIVE INTEGRATION:
    - name: Handle Capacitor Setup and Sync
      run: |
        npx cap add android || true
        ionic capacitor sync android

    - name: Compile Android Debug APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Android APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    runs-on: macos-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Global CLIs
      run: npm install -g @ionic/cli @capacitor/assets @capacitor/cli

    - name: Install Project Dependencies
      run: npm install --legacy-peer-deps

    # REPLACED SEPARATE BUILD AND SYNC WITH THE OFFICIAL NATIVE INTEGRATION:
    - name: Handle Capacitor Setup and Sync
      run: |
        npx cap add ios || true
        ionic capacitor sync ios

    - name: Compile Xcode Project (Bypass Signings)
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace -scheme App -destination 'generic/platform=iOS' -configuration Debug CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

    - name: Upload iOS Xcode Project Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-xcode-project
        path: ios/App
